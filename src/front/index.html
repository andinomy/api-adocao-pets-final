<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Adoção de Pets</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="header">
    <h1>Sistema de Adoção de Pets <i class="fa-solid fa-paw"></i></h1>
    </div>

<div class="pets-container">

<div class="card">
    <img src="kiki_cartaz.jpeg" alt="Kiki">
    <div class="content">
        <h3>Kiki</h3>
        <p>1 ano • Fêmea • Castrada </p>
        <button>
            🩷 Adotar
        </button>
    </div>
</div>

<div class="card">
    <img src="caramelo.jpeg" alt="Caramelo">
    <div class="content">
        <h3>Caramelo </h3>
        <p> 3 anos • Porte grande • Castrado </p>
        <button>
           🩷 Adotar
        </button>
    </div>
</div>

<div class="card">
    <img src="suzana_cartaz.jpeg" alt="Suzana">
    <div class="content">
        <h3>Suzana </h3>
        <p>5 anos • Fêmea • Castrada </p>
        <button>
            🩷 Adotar
        </button>
    </div>
</div>

<div class="card">
    <img src="milkson_cartaz.jpeg" alt="Milkson">
    <div class="content">
        <h3> Milkson </h3>
        <p>2 anos • Macho • Castrado</p>
        <button>
            🩷 Adotar
        </button>
    </div>

</div>

</body>
</html>
